[module]
name = "wifi-probe-logger"
version = "0.3.0"
description = "Registrador passivo de probe requests 802.11; MAC origem + SSID + RSSI por probe"
target = "esp32s3"
author = "v0rtex"
source_url = "https://github.com/wLuC45/TheWave32"

[flash]
artifacts = [
  { path = "bootloader.bin",      offset = "0x0000"  },
  { path = "partition-table.bin", offset = "0x8000"  },
  { path = "firmware.bin",        offset = "0x10000" },
]
