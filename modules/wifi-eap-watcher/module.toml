[module]
name = "wifi-eap-watcher"
version = "0.2.0"
description = "Observador passivo de EAP-Identity 802.1X (audita exposição de IMSI em EAP-SIM/AKA)"
target = "esp32s3"
author = "v0rtex"
source_url = "https://github.com/wLuC45/TheWave32"

[flash]
artifacts = [
  { path = "bootloader.bin",      offset = "0x0000"  },
  { path = "partition-table.bin", offset = "0x8000"  },
  { path = "firmware.bin",        offset = "0x10000" },
]
