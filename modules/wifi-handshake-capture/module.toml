[module]
name = "wifi-handshake-capture"
version = "0.2.1"
description = "Detector de handshake WPA2 4-vias (esqueleto, exportação PCAP adiada)"
target = "esp32s3"
author = "v0rtex"
source_url = "https://github.com/wLuC45/TheWave32"

[flash]
artifacts = [
  { path = "bootloader.bin",      offset = "0x0000"  },
  { path = "partition-table.bin", offset = "0x8000"  },
  { path = "firmware.bin",        offset = "0x10000" },
]
